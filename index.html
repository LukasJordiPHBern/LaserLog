<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lasercutter Log · PHBern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Code+Pro:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ph-red: #ac0101;
            --ph-red-hover: #930101;
            --ph-red-active: #780101;
            --ph-red-bg: #fdf0f0;
            --ph-blue: #457d9a;
            --ph-blue-dark: #2e5366;
            --ph-engrave-bg: #e9f1f5;
            --ph-black: #1a1a1a;
            --ph-gray-darker: #484848;
            --ph-gray-dark: #757575;
            --ph-gray: #979797;
            --ph-gray-light: #d8d8d8;
            --ph-gray-lighter: #fafafa;
            --ph-white: #ffffff;
            --ph-green: #338811;
            --radius: 6px;
            --radius-lg: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Source Sans 3", "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--ph-gray-lighter);
            color: var(--ph-black);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.6rem;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* ---- Title bar ---- */
        .title-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.6rem 0 0.2rem;
        }

        .ph-dot {
            width: 8px;
            height: 8px;
            background: var(--ph-red);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .title-bar h1 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--ph-black);
            letter-spacing: 0.02em;
        }

        /* ---- Cards ---- */
        .card {
            background: var(--ph-white);
            border: 1px solid var(--ph-gray-light);
            border-radius: var(--radius-lg);
            padding: 0.65rem 0.75rem;
        }

        /* ---- Clock ---- */
        .clock-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .clock-date { color: var(--ph-gray-dark); font-size: 0.78rem; }

        .clock-time-group {
            display: flex;
            align-items: baseline;
            gap: 0.35rem;
        }

        .clock-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ph-gray-dark);
        }

        .clock-time {
            font-family: "Source Code Pro", monospace;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--ph-red);
        }

        /* ---- Section Labels ---- */
        .section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--ph-gray-dark);
            margin-bottom: 0.35rem;
        }

        /* ---- Inputs ---- */
        .name-row {
            display: flex;
            gap: 0.4rem;
        }

        .name-input, .andere-input {
            width: 100%;
            background: var(--ph-white);
            border: 1px solid var(--ph-gray-light);
            border-radius: var(--radius);
            padding: 0.6rem 0.65rem;
            color: var(--ph-black);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .name-input:focus, .andere-input:focus {
            border-color: var(--ph-red);
            box-shadow: 0 0 0 2px rgba(172, 1, 1, 0.12);
        }

        .name-input::placeholder, .andere-input::placeholder { color: var(--ph-gray); }

        .andere-input {
            margin-top: 0.4rem;
            display: none;
            font-size: 0.85rem;
            padding: 0.5rem 0.65rem;
        }

        .andere-input.visible { display: block; }

        .name-hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.2rem;
            font-size: 0.65rem;
            color: var(--ph-green);
        }

        .clear-name {
            background: none;
            border: none;
            color: var(--ph-gray);
            font-size: 0.65rem;
            cursor: pointer;
            text-decoration: underline;
            font-family: inherit;
        }

        /* ---- Toggle Buttons ---- */
        .toggle-group {
            display: flex;
            gap: 0.4rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.6rem 0.3rem;
            background: var(--ph-white);
            border: 1px solid var(--ph-gray-light);
            border-radius: var(--radius);
            color: var(--ph-gray-darker);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s ease;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .toggle-btn:active { transform: scale(0.97); }

        .toggle-btn.op-schnitt.selected {
            background: var(--ph-red-bg);
            border-color: var(--ph-red);
            color: var(--ph-red);
        }

        .toggle-btn.op-gravur.selected {
            background: var(--ph-engrave-bg);
            border-color: var(--ph-blue);
            color: var(--ph-blue-dark);
        }

        .material-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.35rem;
        }

        .material-grid .toggle-btn {
            padding: 0.5rem 0.1rem;
            font-size: 0.75rem;
        }

        .toggle-btn.mat.selected {
            background: var(--ph-red-bg);
            border-color: var(--ph-red);
            color: var(--ph-red);
        }

        /* ---- Submit ---- */
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--ph-red);
            border: none;
            border-radius: var(--radius);
            color: var(--ph-white);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .submit-btn:hover { background: var(--ph-red-hover); }
        .submit-btn:active { background: var(--ph-red-active); }
        .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .status {
            text-align: center;
            font-size: 0.75rem;
            color: var(--ph-gray-dark);
            min-height: 1.2rem;
            padding-top: 0.3rem;
        }

        .status.error { color: var(--ph-red); }

        /* ---- Confirmation Screen ---- */
        .confirm-screen { display: none; }

        .confirm-screen.visible {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .confirm-card {
            background: var(--ph-white);
            border: 1px solid var(--ph-gray-light);
            border-radius: var(--radius-lg);
            padding: 1rem 0.85rem;
        }

        .confirm-icon {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .confirm-title {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            color: var(--ph-green);
            margin-bottom: 0.75rem;
        }

        .confirm-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.45rem 0;
            border-bottom: 1px solid var(--ph-gray-light);
        }

        .confirm-row:last-child { border-bottom: none; }

        .confirm-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ph-gray-dark);
        }

        .confirm-value {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--ph-black);
            text-align: right;
        }

        /* ---- Footer ---- */
        .footer {
            text-align: center;
            padding: 0.35rem 0;
            font-size: 0.62rem;
            color: var(--ph-gray);
        }

        /* ---- Views ---- */
        .form-screen { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-screen.hidden { display: none; }
    </style>
</head>
<body>

<div class="container">

    <div class="title-bar">
        <span class="ph-dot"></span>
        <h1>Lasercutter Log</h1>
    </div>

    <!-- ===== FORM ===== -->
    <div class="form-screen" id="formScreen">

        <div class="card">
            <div class="clock-bar">
                <span class="clock-date" id="dateDisplay">—</span>
                <span class="clock-time-group">
                    <span class="clock-label">Startzeit</span>
                    <span class="clock-time" id="timeDisplay">--:--:--</span>
                </span>
            </div>
        </div>

        <div class="card">
            <div class="section-label">Name und Vorname</div>
            <input class="name-input" id="nameInput" type="text" placeholder="Name und Vorname" autocomplete="name">
            <div class="name-hint" id="nameHint" style="display:none">
                <span>✓ Gespeichert auf diesem Gerät</span>
                <button onclick="clearSavedName()" class="clear-name">Ändern</button>
            </div>
        </div>

        <div class="card">
            <div class="section-label">Vorgang · Mehrfachauswahl möglich</div>
            <div class="toggle-group">
                <button class="toggle-btn op-schnitt" data-group="operation" data-value="Schnitt" onclick="toggleMulti(this)">Schnitt</button>
                <button class="toggle-btn op-gravur" data-group="operation" data-value="Gravur" onclick="toggleMulti(this)">Gravur</button>
            </div>
        </div>

        <div class="card">
            <div class="section-label">Material</div>
            <div class="material-grid">
                <button class="toggle-btn mat" data-group="material" data-value="Pappelsperrholz" onclick="toggleMaterial(this)">Pappelsperrholz</button>
                <button class="toggle-btn mat" data-group="material" data-value="Birkensperrholz" onclick="toggleMaterial(this)">Birkensperrholz</button>
                <button class="toggle-btn mat" data-group="material" data-value="MDF" onclick="toggleMaterial(this)">MDF</button>
                <button class="toggle-btn mat" data-group="material" data-value="PMMA (Acryl)" onclick="toggleMaterial(this)">PMMA (Acryl)</button>
                <button class="toggle-btn mat" data-group="material" data-value="Karton" onclick="toggleMaterial(this)">Karton</button>
                <button class="toggle-btn mat" data-group="material" data-value="Papier" onclick="toggleMaterial(this)">Papier</button>
                <button class="toggle-btn mat" data-group="material" data-value="Leder" onclick="toggleMaterial(this)">Leder</button>
                <button class="toggle-btn mat" data-group="material" data-value="Textil" onclick="toggleMaterial(this)">Textil</button>
                <button class="toggle-btn mat" data-group="material" data-value="Andere" onclick="toggleMaterial(this)">Andere</button>
            </div>
            <input class="andere-input" id="textilInput" type="text" placeholder="Textiles Material eingeben …">
            <input class="andere-input" id="andereInput" type="text" placeholder="Material eingeben …">
        </div>

        <div class="card">
            <button class="submit-btn" id="submitBtn" onclick="submitEntry()">Eintragen</button>
            <div class="status" id="status"></div>
        </div>

    </div>

    <!-- ===== CONFIRMATION ===== -->
    <div class="confirm-screen" id="confirmScreen">

        <div class="confirm-card">
            <div class="confirm-icon">✓</div>
            <div class="confirm-title">Eintrag gespeichert</div>
            <div id="confirmDetails"></div>
        </div>

        <button class="submit-btn" onclick="newEntry()">Neuer Eintrag</button>

    </div>

    <div class="footer">PHBern · Lasercutter Log</div>

</div>

<script>
    // ============================================================
    // KONFIGURATION: Hier die Google Apps Script URL eintragen
    // ============================================================
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwawCbNFharIqLDOjk__Y9GtNdYp3nlYMK7_SGwx-wwIRkGr8qRfFSM901MTNan6kEP/exec';
    // ============================================================

    const savedName = localStorage.getItem('lasercutter_name');
    if (savedName) {
        document.getElementById('nameInput').value = savedName;
        document.getElementById('nameHint').style.display = 'flex';
    }

    function clearSavedName() {
        localStorage.removeItem('lasercutter_name');
        document.getElementById('nameInput').value = '';
        document.getElementById('nameInput').focus();
        document.getElementById('nameHint').style.display = 'none';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('timeDisplay').textContent =
            now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('dateDisplay').textContent =
            now.toLocaleDateString('de-CH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Operation: multi-select toggle
    function toggleMulti(btn) {
        btn.classList.toggle('selected');
    }

    function getSelectedMulti(group) {
        return [...document.querySelectorAll(`[data-group="${group}"].selected`)]
            .map(b => b.dataset.value);
    }

    // Material: single select, Textil + Andere show text fields
    function toggleMaterial(btn) {
        const val = btn.dataset.value;
        const textilInput = document.getElementById('textilInput');
        const andereInput = document.getElementById('andereInput');

        document.querySelectorAll('[data-group="material"]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        // Hide both first
        textilInput.classList.remove('visible');
        andereInput.classList.remove('visible');

        if (val === 'Textil') {
            textilInput.classList.add('visible');
            textilInput.focus();
        } else if (val === 'Andere') {
            andereInput.classList.add('visible');
            andereInput.focus();
        }
    }

    function getSelectedMaterial() {
        const sel = document.querySelector('[data-group="material"].selected');
        if (!sel) return '';
        if (sel.dataset.value === 'Textil') {
            const v = document.getElementById('textilInput').value.trim();
            return v ? 'Textil: ' + v : '';
        }
        if (sel.dataset.value === 'Andere') {
            return document.getElementById('andereInput').value.trim() || '';
        }
        return sel.dataset.value;
    }

    function setStatus(msg, type = '') {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + type;
    }

    function showForm() {
        document.getElementById('formScreen').classList.remove('hidden');
        document.getElementById('confirmScreen').classList.remove('visible');
    }

    function showConfirm(payload) {
        document.getElementById('formScreen').classList.add('hidden');
        document.getElementById('confirmDetails').innerHTML = `
            <div class="confirm-row"><span class="confirm-label">Name</span><span class="confirm-value">${payload.name}</span></div>
            <div class="confirm-row"><span class="confirm-label">Datum</span><span class="confirm-value">${payload.datum}</span></div>
            <div class="confirm-row"><span class="confirm-label">Startzeit</span><span class="confirm-value">${payload.zeit}</span></div>
            <div class="confirm-row"><span class="confirm-label">Vorgang</span><span class="confirm-value">${payload.vorgang}</span></div>
            <div class="confirm-row"><span class="confirm-label">Material</span><span class="confirm-value">${payload.material}</span></div>
        `;
        document.getElementById('confirmScreen').classList.add('visible');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function newEntry() {
        document.querySelectorAll('.toggle-btn.selected').forEach(b => b.classList.remove('selected'));
        document.getElementById('textilInput').classList.remove('visible');
        document.getElementById('textilInput').value = '';
        document.getElementById('andereInput').classList.remove('visible');
        document.getElementById('andereInput').value = '';
        setStatus('');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = 'Eintragen';
        showForm();
    }

    async function submitEntry() {
        const name = document.getElementById('nameInput').value.trim();
        const operations = getSelectedMulti('operation');
        const material = getSelectedMaterial();

        if (!name) { setStatus('Bitte Name und Vorname eingeben', 'error'); document.getElementById('nameInput').focus(); return; }
        if (name.split(/\s+/).length < 2) { setStatus('Bitte Name und Vorname eingeben', 'error'); document.getElementById('nameInput').focus(); return; }
        if (operations.length === 0) { setStatus('Bitte Vorgang wählen', 'error'); return; }

        const selMat = document.querySelector('[data-group="material"].selected');
        if (!selMat) { setStatus('Bitte Material wählen', 'error'); return; }
        if (!material) {
            if (selMat.dataset.value === 'Textil') {
                setStatus('Bitte textiles Material eingeben', 'error');
                document.getElementById('textilInput').focus();
            } else {
                setStatus('Bitte Material eingeben', 'error');
                document.getElementById('andereInput').focus();
            }
            return;
        }

        localStorage.setItem('lasercutter_name', name);

        const now = new Date();
        const datum = now.toLocaleDateString('de-CH');
        const zeit = now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Sende …';
        setStatus('');

        const payload = { name, datum, zeit, vorgang: operations.join(' + '), material };

        try {
            if (GOOGLE_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbwawCbNFharIqLDOjk__Y9GtNdYp3nlYMK7_SGwx-wwIRkGr8qRfFSM901MTNan6kEP/exec') {
                console.log('Demo-Eintrag:', payload);
                await new Promise(r => setTimeout(r, 600));
                showConfirm(payload);
                return;
            }

            const params = new URLSearchParams(payload);
            const url = GOOGLE_SCRIPT_URL + '?' + params.toString();
            await fetch(url, { mode: 'no-cors' });
            showConfirm(payload);
        } catch (err) {
            console.error(err);
            setStatus('Fehler beim Senden. Nochmal versuchen.', 'error');
            btn.disabled = false;
            btn.textContent = 'Eintragen';
        }
    }
</script>

</body>
</html>
